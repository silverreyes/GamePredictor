services:
  postgres:
    image: postgres:16-alpine
    mem_limit: 2g
    environment:
      POSTGRES_DB: nflpredictor
      POSTGRES_USER: nfl
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nfldev}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nfl"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    mem_limit: 1g
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      DATABASE_URL: postgresql+psycopg://nfl:${POSTGRES_PASSWORD:-nfldev}@postgres:5432/nflpredictor
      MODEL_PATH: /app/models-vol/best_model.json
      EXPERIMENTS_PATH: /app/models-vol/experiments.jsonl
      SPREAD_MODEL_PATH: /app/models-vol/best_spread_model.json
      SPREAD_EXPERIMENTS_PATH: /app/models-vol/spread_experiments.jsonl
      RELOAD_TOKEN: ${RELOAD_TOKEN:-devtoken}
    volumes:
      - models:/app/models-vol:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    build: .
    mem_limit: 4g
    command: ["python", "-m", "pipeline.worker"]
    environment:
      DATABASE_URL: postgresql+psycopg://nfl:${POSTGRES_PASSWORD:-nfldev}@postgres:5432/nflpredictor
      MODEL_PATH: /app/models-vol/best_model.json
      EXPERIMENTS_PATH: /app/models-vol/experiments.jsonl
      SPREAD_MODEL_PATH: /app/models-vol/best_spread_model.json
      SPREAD_EXPERIMENTS_PATH: /app/models-vol/spread_experiments.jsonl
      REFRESH_CRON_HOUR: ${REFRESH_CRON_HOUR:-6}
    volumes:
      - models:/app/models-vol
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    mem_limit: 128m
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  models:
